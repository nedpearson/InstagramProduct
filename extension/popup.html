<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Bridgebox Voice Capture</title>
  <style>
    :root {
      --bg: #0a0a0b;
      --panel: #111113;
      --border: rgba(255, 255, 255, 0.08);
      --text: #ffffff;
      --muted: #a1a1aa;
      --primary: #4f46e5;
      --primary-hover: #4338ca;
      --danger: #ef4444;
      --danger-hover: #dc2626;
      --success: #10b981;
    }
    body {
      width: 320px;
      margin: 0;
      padding: 16px;
      background-color: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
      padding-bottom: 12px;
      border-bottom: 1px solid var(--border);
    }
    .header img {
      width: 24px;
      height: 24px;
    }
    .header h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 12px;
      margin-bottom: 12px;
      background-color: var(--panel);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn:hover {
      background-color: rgba(255,255,255,0.05);
      border-color: rgba(255,255,255,0.15);
    }
    .btn.primary {
      background-color: var(--primary);
      border-color: var(--primary);
    }
    .btn.primary:hover {
      background-color: var(--primary-hover);
    }
    .btn.danger {
      background-color: var(--danger);
      border-color: var(--danger);
      animation: pulse 2s infinite;
    }
    .btn.danger:hover {
      background-color: var(--danger-hover);
    }
    .icon {
      width: 18px;
      height: 18px;
      stroke: currentColor;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
    }
    @keyframes pulse {
      0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); }
      70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
      100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
    }
    .status {
      font-size: 12px;
      color: var(--muted);
      text-align: center;
      margin-top: 16px;
      min-height: 18px;
    }
    .success-text {
      color: var(--success);
    }
  </style>
</head>
<body>
  <div class="header">
    <!-- Inline SVG for logo -->
    <svg class="icon" style="width:24px;height:24px;stroke:var(--primary)" viewBox="0 0 24 24">
      <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
      <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
      <line x1="12" y1="22.08" x2="12" y2="12"></line>
    </svg>
    <h1>Bridgebox Capture</h1>
  </div>

  <div id="default-view">
    <button id="btn-screenshot" class="btn">
      <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
      Capture Visible Tab
    </button>
    
    <button id="btn-start-record" class="btn primary">
      <svg class="icon" viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"></polygon><rect x="1" y="5" width="15" height="14" rx="2" ry="2"></rect></svg>
      Start Screen Recording
    </button>
  </div>

  <div id="recording-view" style="display: none;">
    <button id="btn-stop-record" class="btn danger">
      <svg class="icon" viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect></svg>
      Stop Recording
    </button>
  </div>

  <div id="status" class="status">Ready to capture.</div>

  <script src="popup.js"></script>
</body>
</html>
